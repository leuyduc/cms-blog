apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: cms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: cms-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: cms-secret
          env:
            - name: NODE_ENV
              value: "production"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
          command: ["node", "dist/workers/index.js"]
